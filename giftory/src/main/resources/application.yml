spring:
  application:
    name:demo
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/gift?serverTimezone=UTC&useSSL=false&characterEncoding=UTF-8
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver


#jwt토큰 관련 정보
app:
  auth:
    tokenSecret: ${JWT_TOKEN_SECRET}
    tokenExpirationMsec: 864000000  # 기본값 지정 가능


