spring:
  config:
    import: optional:file:.env.dev[.properties]

  jpa:
    hibernate:
      ddl-auto: update       # 개발용: create, update, validate, none
    show-sql: true            # 쿼리 로그 출력
    properties:
      hibernate:
        show_sql: true               # SQL 출력
        format_sql: true      # SQL 예쁘게 출력
        use_sql_comments: true
        generate_statistics: true
        type:
          descriptor:
            sql:
              BasicBinder: TRACE     # 바인딩 파라미터 로그 출력

  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
        registration:
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID}
            client-secret: ${OAUTH_KAKAO_CLIENT_SECRET}
            redirect-uri: ${OAUTH_KAKAO_REDIRECT_URL}
            scope:
              - profile_nickname
              - account_email
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: kakao

#jwt토큰 관련 정보
jwt:
  secret: ${JWT_TOKEN_SECRET}
  expiration-seconds: 864000000
app:
  frontend:
    url: http://localhost:3000
  invite:
    secret: ${JWT_INVITE_SECRET}
    ttl-hours: 168 # 만료 7일


logging:
  level:
    org.springframework.security: DEBUG
    root: info
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
    org.hibernate.orm.jdbc.bind: trace